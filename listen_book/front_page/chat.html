<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>听书知识库</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-card: #f1f5f9;
      --accent: #3b82f6;
      --accent-light: #60a5fa;
      --accent-secondary: #10b981;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --gradient-1: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      --gradient-2: linear-gradient(135deg, #f472b6 0%, #fb7185 100%);
      --gradient-3: linear-gradient(135deg, #10b981 0%, #34d399 100%);
      --border-color: #e2e8f0;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-primary);
      min-height: 100vh;
      display: flex;
    }

    /* 侧边栏 */
    .sidebar {
      width: 260px;
      background: var(--bg-secondary);
      padding: 20px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-color);
      box-shadow: var(--shadow);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--gradient-1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      color: var(--text-primary);
      font-size: 18px;
      font-weight: 600;
    }

    .sidebar-nav { flex: 1; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 10px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .nav-item:hover {
      background: var(--bg-card);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: var(--gradient-1);
      color: #ffffff;
      box-shadow: var(--shadow);
    }

    .nav-icon { font-size: 18px; }

    .sidebar-footer {
      padding-top: 20px;
      border-top: 1px solid var(--border-color);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }

    /* 主内容区 */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-primary);
    }

    /* 聊天头部 */
    .chat-header {
      padding: 16px 24px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
    }

    .chat-title {
      color: var(--text-primary);
      font-size: 16px;
      font-weight: 500;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
    }

    /* 消息区域 */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 80%;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .avatar.bot {
      background: var(--gradient-1);
    }

    .avatar.user {
      background: var(--gradient-2);
    }

    .message-content {
      flex: 1;
      min-width: 0;
    }

    .message-bubble {
      padding: 12px 16px;
      border-radius: 14px;
      line-height: 1.5;
      font-size: 14px;
    }

    .message.bot .message-bubble {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border-color);
    }

    .message.user .message-bubble {
      background: var(--gradient-1);
      color: #ffffff;
      border-bottom-right-radius: 4px;
      box-shadow: var(--shadow);
    }

    .message-time {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    .message.user .message-time {
      text-align: right;
    }

    /* Markdown 渲染样式 */
    .message-bubble strong { font-weight: 600; }
    .message-bubble em { font-style: italic; }
    .message-bubble code {
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(0,0,0,0.06);
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 0.9em;
    }
    .message.user .message-bubble code { background: rgba(255,255,255,0.2); }
    .message-bubble pre {
      padding: 10px;
      border-radius: 8px;
      background: rgba(0,0,0,0.05);
      overflow-x: auto;
      margin: 8px 0;
    }
    .message.user .message-bubble pre { background: rgba(255,255,255,0.15); }
    .message-bubble pre code { padding: 0; background: none; }
    .message-bubble ul, .message-bubble ol { margin: 8px 0; padding-left: 20px; }
    .message-bubble li { margin: 4px 0; }
    .message-bubble p { margin: 8px 0; }
    .message-bubble p:first-child { margin-top: 0; }
    .message-bubble p:last-child { margin-bottom: 0; }
    .message-bubble a { color: var(--accent); text-decoration: none; }
    .message.user .message-bubble a { color: #ffffff; text-decoration: underline; }

    /* 进度展示 */
    .progress-panel {
      margin-top: 10px;
      padding: 10px 14px;
      background: var(--bg-secondary);
      border-radius: 10px;
      border: 1px dashed var(--border-color);
      box-shadow: var(--shadow);
      display: none;
    }

    .progress-panel.show { display: block; }

    .progress-title {
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }

    .progress-title:hover { color: var(--text-primary); }

    .progress-list {
      list-style: none;
      margin-top: 8px;
      display: none;
    }

    .progress-panel.open .progress-list { display: block; }

    .progress-item {
      font-size: 12px;
      padding: 4px 0;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .progress-item.done { color: #22c55e; }
    .progress-item.running { color: #f59e0b; }

    /* 输入区域 */
    .input-area {
      padding: 16px 24px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      box-shadow: var(--shadow);
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input-box {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-field {
      width: 100%;
      min-height: 44px;
      max-height: 120px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 2px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 14px;
      resize: none;
      outline: none;
      transition: all 0.2s;
    }

    .input-field:focus {
      border-color: var(--accent);
      background: var(--bg-secondary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .input-field::placeholder { color: var(--text-secondary); }

    .input-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .input-hint {
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* 流式开关样式 */
    .stream-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .stream-toggle:hover {
      background: var(--bg-card);
    }

    .stream-toggle input {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .stream-toggle span {
      font-size: 13px;
      color: var(--text-secondary);
      user-select: none;
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: none;
      background: var(--gradient-1);
      color: #ffffff;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
    }

    .send-btn:hover {
      transform: scale(1.05);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* 打字动画 */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 6px 0;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: typing-bounce 1.4s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .messages-area { padding: 12px; }
      .input-area { padding: 12px; }
    }
  </style>
</head>
<body>
  <!-- 侧边栏 -->
  <aside class="sidebar">
    <div class="logo-area">
      <div class="logo-icon">📚</div>
      <span class="logo-text">听书知识库</span>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-item active">
        <span class="nav-icon">💬</span>
        <span>智能问答</span>
      </div>
      <div class="nav-item" onclick="window.location.href='/front_page/import.html'">
        <span class="nav-icon">📥</span>
        <span>内容导入</span>
      </div>
      <div class="nav-item" onclick="window.location.href='/front_page/books.html'">
        <span class="nav-icon">📖</span>
        <span>书籍管理</span>
      </div>
      <div class="nav-item">
        <span class="nav-icon">⚙️</span>
        <span>系统设置</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="status-indicator">
        <span class="status-dot"></span>
        <span>服务在线</span>
      </div>
    </div>
  </aside>

  <!-- 主内容 -->
  <main class="main-content">
    <header class="chat-header">
      <h2 class="chat-title">智能问答</h2>
      <div class="header-actions">
        <button class="action-btn" id="clearBtn">清空对话</button>
      </div>
    </header>

    <div class="messages-area" id="messagesArea">
      <div class="message bot">
        <div class="avatar bot">🤖</div>
        <div class="message-content">
          <div class="message-bubble">
            👋 你好！我是听书知识库智能助手。<br><br>
            我可以帮你：<br>
            • 📚 查询书籍详情和作者信息<br>
            • 🎧 推荐适合你的有声书<br>
            • 📝 查找听书笔记和评论<br>
            • 💬 解答关于书籍的常见问题<br><br>
            试着问我：<i>"《三体》讲什么？" 或 "推荐一本科幻小说"</i>
          </div>
          <div class="message-time">现在</div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <div class="input-box">
          <textarea class="input-field" id="inputField" placeholder="输入你的问题..." rows="1"></textarea>
          <div class="input-footer">
            <span class="input-hint">Enter 发送 · Shift+Enter 换行</span>
            <label class="stream-toggle">
              <input type="checkbox" id="streamToggle" checked>
              <span>流式输出</span>
            </label>
          </div>
        </div>
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
    </div>
  </main>

  <script>
    const API_BASE = location.protocol + '//' + location.host;
    const messagesArea = document.getElementById('messagesArea');
    const inputField = document.getElementById('inputField');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const streamToggle = document.getElementById('streamToggle');

    // 最多显示的消息数量
    const MAX_VISIBLE_MESSAGES = 20;

    let sessionId = localStorage.getItem('lb_session_id');
    if (!sessionId) {
      sessionId = 'sess-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem('lb_session_id', sessionId);
    }

    function scrollToBottom() {
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function formatTime() {
      return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(str) {
      return String(str).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
    }

    function renderMarkdown(text) {
      if (!text) return '';
      try {
        return marked.parse(text);
      } catch (e) {
        console.warn('Markdown 解析失败:', e);
        return escapeHtml(text);
      }
    }

    // 限制消息数量，保持界面整洁
    function limitMessages() {
      const messages = messagesArea.querySelectorAll('.message');
      if (messages.length > MAX_VISIBLE_MESSAGES) {
        // 保留欢迎消息，删除其他旧消息
        for (let i = 1; i < messages.length - MAX_VISIBLE_MESSAGES + 1; i++) {
          messages[i].remove();
        }
      }
    }

    function addMessage(role, text, showProgress = false) {
      const avatarIcon = role === 'user' ? '👤' : '🤖';
      const contentHtml = role === 'bot' && showProgress
        ? '<div class="typing-indicator"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>'
        : (role === 'bot' ? renderMarkdown(text) : escapeHtml(text));

      const msgHtml = `
        <div class="message ${role}" id="msg-${Date.now()}">
          <div class="avatar ${role}">${avatarIcon}</div>
          <div class="message-content">
            <div class="message-bubble">${contentHtml}</div>
            ${showProgress ? '<div class="progress-panel show open"><div class="progress-title">⏳ 处理中 ▼</div><ul class="progress-list"></ul></div>' : ''}
            <div class="message-time">${formatTime()}</div>
          </div>
        </div>
      `;
      messagesArea.insertAdjacentHTML('beforeend', msgHtml);
      limitMessages();
      scrollToBottom();

      const msgEl = messagesArea.lastElementChild;

      // 绑定进度面板点击事件
      const progressPanel = msgEl.querySelector('.progress-panel');
      if (progressPanel) {
        const progressTitle = msgEl.querySelector('.progress-title');
        progressTitle.addEventListener('click', () => {
          progressPanel.classList.toggle('open');
        });
      }

      return msgEl;
    }

    function updateProgress(msgEl, doneList, runningList, status) {
      const progressList = msgEl.querySelector('.progress-list');
      const progressPanel = msgEl.querySelector('.progress-panel');
      if (!progressList || !progressPanel) return;

      const statusConfig = {
        processing: { text: '处理中', emoji: '⏳' },
        completed: { text: '完成', emoji: '✅' },
        failed: { text: '失败', emoji: '❌' },
        pending: { text: '等待', emoji: '⏸️' }
      };

      const config = statusConfig[status] || statusConfig.processing;
      const title = msgEl.querySelector('.progress-title');
      if (title) {
        title.textContent = `${config.emoji} ${config.text} ▼`;
      }

      // 完成或失败后隐藏进度面板
      if (status === 'completed' || status === 'failed') {
        setTimeout(() => {
          progressPanel.classList.remove('show');
        }, 1500); // 1.5秒后隐藏
      }

      progressList.innerHTML = '';
      (doneList || []).forEach(item => {
        progressList.innerHTML += `<li class="progress-item done">✅ ${escapeHtml(item)}</li>`;
      });
      (runningList || []).forEach(item => {
        progressList.innerHTML += `<li class="progress-item running">⏳ ${escapeHtml(item)}</li>`;
      });
    }

    function finalizeMessage(msgEl, answer, error) {
      const bubble = msgEl.querySelector('.message-bubble');
      const typing = msgEl.querySelector('.typing-indicator');
      const progress = msgEl.querySelector('.progress-panel');

      if (typing) typing.remove();

      // 隐藏进度面板
      if (progress) {
        setTimeout(() => {
          progress.classList.remove('show');
        }, 1000);
      }

      if (error) {
        bubble.innerHTML = `<span style="color:#ef4444">❌ ${escapeHtml(error)}</span>`;
      } else {
        bubble.innerHTML = renderMarkdown(answer || '未返回答案');
      }
    }

    async function loadHistory() {
      try {
        const res = await fetch(`${API_BASE}/history/${sessionId}`);
        if (!res.ok) return;
        const data = await res.json();
        const items = (data.items || []).slice(-10); // 只加载最近10条
        items.reverse().forEach(item => {
          if (item.role === 'user') addMessage('user', item.text);
          else addMessage('bot', item.text);
        });
        scrollToBottom();
      } catch (e) {}
    }

    async function sendMessage() {
      const text = inputField.value.trim();
      if (!text) return;
      inputField.value = '';

      addMessage('user', text);
      const botMsg = addMessage('bot', '', true);
      sendBtn.disabled = true;

      try {
        const isStream = streamToggle.checked;
        const res = await fetch(`${API_BASE}/query`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: text, session_id: sessionId, is_stream: isStream })
        });
        const data = await res.json();

        updateProgress(botMsg, [], [], 'processing');

        if (!isStream) {
          updateProgress(botMsg, data.done_list || [], [], 'completed');
          finalizeMessage(botMsg, data.answer, data.error);
          sendBtn.disabled = false;
          return;
        }

        const taskId = data.task_id;
        let rawAnswer = '';
        const es = new EventSource(`${API_BASE}/stream/${taskId}`);

        es.addEventListener('progress', e => {
          const d = JSON.parse(e.data || '{}');
          updateProgress(botMsg, d.done_list || [], d.running_list, d.status);
          if (d.status === 'completed') {
            const typing = botMsg.querySelector('.typing-indicator');
            if (typing) typing.remove();
            sendBtn.disabled = false;
          }
        });

        es.addEventListener('delta', e => {
          const d = JSON.parse(e.data || '{}');
          if (d.delta) {
            rawAnswer += d.delta;
            const bubble = botMsg.querySelector('.message-bubble');
            const typing = bubble.querySelector('.typing-indicator');
            if (typing) typing.remove();
            bubble.innerHTML = escapeHtml(rawAnswer);
            scrollToBottom();
          }
        });

        es.addEventListener('final', e => {
          const d = JSON.parse(e.data || '{}');
          finalizeMessage(botMsg, d.answer || rawAnswer, d.error);
          es.close();
        });

        es.addEventListener('error', e => {
          finalizeMessage(botMsg, rawAnswer, '连接中断');
          es.close();
          sendBtn.disabled = false;
        });

      } catch (e) {
        finalizeMessage(botMsg, '', e.message);
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    inputField.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    clearBtn.addEventListener('click', async () => {
      if (!confirm('确定清空对话历史？')) return;
      await fetch(`${API_BASE}/history/${sessionId}`, { method: 'DELETE' });
      const messages = messagesArea.querySelectorAll('.message');
      messages.forEach((m, i) => i > 0 && m.remove());
    });

    loadHistory();
    inputField.focus();

    // 检查是否有待提问的问题（从书籍管理页面跳转过来）
    const pendingQuestion = localStorage.getItem('lb_ask_question');
    if (pendingQuestion) {
      localStorage.removeItem('lb_ask_question');
      inputField.value = pendingQuestion;
      setTimeout(() => sendMessage(), 300);
    }
  </script>
</body>
</html>
